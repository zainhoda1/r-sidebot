  type: select
  label: 'X axis:'
  options:
    hp: hp
    mpg: mpg
    cyl: cyl
    disp: disp
scatter_y:
  type: select
  label: 'Color scatter plot by:'
  options:
    hp: hp
    mpg: mpg
    cyl: cyl
    disp: disp
q0_1:
  type: mc
  label: How comfortable are you with using visualizations as a form of information
    sharing?
  options:
    Very uncomfortable - I find visualizations confusing and much prefer receiving information through text or verbal explanations: option_1
    ? Somewhat uncomfortable - I can understand basic charts but often struggle to
      interpret more complex visualizations or extract key insights from them
    : option_2
    ? Moderately comfortable - I’m fine with standard visualizations like bar charts
      and line graphs, but complex or interactive visualizations can be overwhelming
    : option_3
    ? Quite comfortable - I can easily interpret most types of visualizations and
      often find them more effective than text for understanding data and trends
    : option_4
    ? Extremely comfortable - I love working with visualizations of all types. I find
      them intuitive, can quickly extract insights from complex charts, and prefer
      visual information over text when possible
    : option_5
q0_2:
  type: mc
  label: What kind of data relationship does a scatter plot typically show?
  options:
    Distribution of categories: option_1
    Proportions within a whole: option_2
    Relationship between two numerical variables: option_3
    Sequence over time: option_4
q0_3:
  type: mc
  label: What do individual points on a scatter plot represent?
  options:
    Categories: option_1
    Data records or observations: option_2
    Statistical summaries: option_3
    Totals per group: option_4
q0_4:
  type: mc
  label: In a scatter plot, what does the size or color of points typically represent
    (if used)?
  options:
    Axis value: option_1
    Category grouping or a third variable: option_2
    Random styling: option_3
    Statistical error: option_4
